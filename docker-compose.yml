version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: doc-summary-backend
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app/backend
      - ./backend/uploads:/app/backend/uploads
    command: python app/main.py
    networks:
      - doc-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: doc-summary-frontend
    ports:
      - "3030:3030"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - doc-network

networks:
  doc-network:
    driver: bridge
